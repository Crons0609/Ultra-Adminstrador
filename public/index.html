<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ultra Administrador - Sistema SaaS Multi-Tenant para administración de restaurantes, bares y cafeterías.">
  <meta name="theme-color" content="#0a0a0b">
  <title>Ultra Administrador — Gestión Inteligente de Restaurantes</title>
  
  <!-- Favicon & PWA Manifest -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  
  <!-- Typography (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet Map CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Import Map for Native ES Modules -->
  <script type="importmap">
  {
    "imports": {
      "gsap": "https://esm.sh/gsap@3.12.5",
      "lenis": "https://esm.sh/lenis@1.1.18",
      "three": "https://esm.sh/three@0.160.0",
      "motion": "https://esm.sh/motion@11.11.17"
    }
  }
  </script>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: {
              primary: 'var(--color-bg-primary)',
              secondary: 'var(--color-bg-secondary)',
              tertiary: 'var(--color-bg-tertiary)'
            },
            surface: {
              DEFAULT: 'var(--color-surface)',
              hover: 'var(--color-surface-hover)'
            },
            accent: {
              DEFAULT: 'var(--color-accent)',
              hover: 'var(--color-accent-hover)',
              light: 'var(--color-accent-light)'
            },
            text: {
              primary: 'var(--color-text-primary)',
              secondary: 'var(--color-text-secondary)',
              tertiary: 'var(--color-text-tertiary)'
            },
            success: 'var(--color-success)',
            warning: 'var(--color-warning)',
            danger: 'var(--color-danger)',
            info: 'var(--color-info)'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- CSS Stylesheet Entrypoint -->
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body class="theme-dark">
  <!-- Application Root -->
  <div id="app" class="app-container"></div>
  
  <!-- Application Bootstrap -->
  <script type="module" src="/src/app.js"></script>
</body>
</html>
